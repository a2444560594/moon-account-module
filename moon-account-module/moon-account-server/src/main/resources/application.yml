spring:
  application:
    name: moon-account-server
  datasource:
      dirver-class-name: com.mysql.jdbc.Driver
      url: jdbc:mysql://localhost:3306/springboot_demo?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&allowLoadLocalInfile=true&allowUrlInLocalInfile=true&allowPublicKeyRetrieval=true&allowMultiQueries=true&allowUrlInLocalInfile=true&allowPublicKeyRetrieval=true&allowMultiQueries=true&allowUrlInLocalInfile=true&allowPublicKey
      username: root
      password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      timeout: 2000ms
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  dubbo:
    application:
      name: ${spring.application.name}
    registry:
      address: nacos://127.0.0.1:8848
    scan:
      base-packages: com.market.account.Service.impl

mybatis:
    type-aliases-package: com.example.springbootdemo.entity
    mapper-locations: classpath:mapper/*.xml
    configuration:
        map-underscore-to-camel-case: true

app:
  id: moon-market-login-server
  meta: http://192.168.1.1:8080
  bootstrap:
    enable: true
    namespaces: dev